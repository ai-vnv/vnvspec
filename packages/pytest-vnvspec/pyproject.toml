[project]
name = "pytest-vnvspec"
version = "0.2.0"
description = "pytest plugin for vnvspec V&V specifications — captures evidence from test results."
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Mansur Arief", email = "ariefm@stanford.edu" },
]
requires-python = ">=3.11"
dependencies = [
    "pytest>=7.0",
    "vnvspec>=0.2.0",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: Pytest",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]

[project.entry-points.pytest11]
vnvspec = "pytest_vnvspec.plugin"

[project.urls]
Homepage = "https://github.com/ai-vnv/vnvspec"
Documentation = "https://ai-vnv.github.io/vnvspec/integrations/pytest/"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pytest_vnvspec"]
