# vnvspec self-specification — vnvspec assessed against itself
#
# This spec defines the requirements that vnvspec (the tool) must satisfy.
# Run: vnvspec assess --self
# Or:  python scripts/self_assess.py

name: vnvspec-self
version: "0.2.0"
description: >
  Self-hosting specification for the vnvspec package. Every requirement here
  is verified by the vnvspec test suite, lint/typecheck infrastructure, or
  by inspection of the codebase. If a v0.2 change breaks self-assessment,
  that's a regression — the change is rolled back, not the self-spec.

requirements:
  # --- Core model invariants ---
  - id: REQ-SELF-FROZEN-001
    statement: The core models (Spec, Requirement, Evidence, Hazard, ODD, IOContract, TraceLink) shall be frozen Pydantic models.
    rationale: Frozen models prevent accidental mutation and guarantee hashability for traceability graphs.
    verification_method: test
    acceptance_criteria:
      - 'Every core model has model_config = {"frozen": True}.'
      - Attempting to set an attribute on a constructed model raises a ValidationError.
    priority: blocking

  - id: REQ-SELF-FROZEN-002
    statement: The Spec.extend() method shall return a new Spec instance without mutating the original.
    rationale: Frozen-model invariance must extend to the extend() API itself.
    verification_method: test
    acceptance_criteria:
      - spec.extend(new_req) returns a new Spec.
      - The original spec.requirements list is unchanged.
    priority: blocking

  # --- Backward compatibility ---
  - id: REQ-SELF-COMPAT-001
    statement: Every public symbol exported by vnvspec v0.1.0 shall remain importable in v0.2.0 with the same signature.
    rationale: The v0.2 backward-compatibility contract is enforced in CI.
    verification_method: test
    acceptance_criteria:
      - scripts/check_v0_1_compat.py exits with code 0.
      - All 16 v0.1 symbols are importable from the vnvspec top-level namespace.
    priority: blocking

  # --- Type safety ---
  - id: REQ-SELF-TYPES-001
    statement: The vnvspec source code shall pass mypy --strict with zero errors.
    rationale: Strict type checking catches a class of bugs that tests miss.
    verification_method: analysis
    acceptance_criteria:
      - 'mypy --strict src/vnvspec reports "Success: no issues found".'
    priority: blocking

  # --- Code quality ---
  - id: REQ-SELF-LINT-001
    statement: The vnvspec source code shall pass ruff format and ruff check with zero errors.
    rationale: Consistent formatting and lint rules reduce review friction.
    verification_method: analysis
    acceptance_criteria:
      - ruff format --check . reports all files formatted.
      - ruff check . reports all checks passed.
    priority: blocking

  # --- Test coverage ---
  - id: REQ-SELF-COV-001
    statement: The test suite shall achieve at least 85 percent code coverage.
    rationale: Coverage threshold ensures new code is exercised by tests.
    verification_method: test
    acceptance_criteria:
      - pytest --cov-fail-under=85 exits with code 0.
    priority: high

  # --- Documentation ---
  - id: REQ-SELF-DOCS-001
    statement: The documentation site shall build with mkdocs --strict and zero warnings.
    rationale: Broken links and missing pages degrade the user experience.
    verification_method: analysis
    acceptance_criteria:
      - mkdocs build --strict exits with code 0.
    priority: high

  # --- Evidence.details ergonomics ---
  - id: REQ-SELF-ERGO-001
    statement: 'The Evidence.details field shall accept both str and dict values, auto-wrapping str to {"message": str}.'
    rationale: This was the number-one friction point reported in the labwork integration.
    verification_method: test
    acceptance_criteria:
      - 'Evidence(details="ok").details == {"message": "ok"}.'
      - 'Evidence(details={"key": "val"}).details == {"key": "val"}.'
      - JSON round-trip preserves the dict shape.
    priority: high

  # --- Report.summary ergonomics ---
  - id: REQ-SELF-ERGO-002
    statement: The Report.summary field shall accept both str and dict values, with the same auto-wrap as Evidence.details.
    rationale: Consistency with Evidence.details.
    verification_method: test
    acceptance_criteria:
      - 'Report(summary="ok").summary == {"message": "ok"}.'
    priority: medium

  # --- CLI exit codes ---
  - id: REQ-SELF-CLI-001
    statement: The vnvspec CLI shall use structured exit codes (0 through 5) as defined by ExitCode enum.
    rationale: Structured exit codes allow CI pipelines to distinguish failure modes.
    verification_method: inspection
    acceptance_criteria:
      - ExitCode enum defines OK=0, ASSESSMENT_FAILURES=1, INCONCLUSIVE=2, SPEC_VALIDATION_ERROR=3, USAGE_ERROR=4, INTERNAL_ERROR=5.
      - All CLI subcommands use ExitCode values, not raw integers.
    priority: medium

  # --- EvidenceCollector ---
  - id: REQ-SELF-COLLECTOR-001
    statement: The EvidenceCollector shall validate requirement IDs against the spec and raise RequirementError for unknown IDs.
    rationale: Strong contract prevents evidence from being silently orphaned.
    verification_method: test
    acceptance_criteria:
      - collector.check("UNKNOWN", True) raises RequirementError.
      - collector.record("UNKNOWN", "pass") raises RequirementError.
    priority: high

  # --- Spec I/O round-trip ---
  - id: REQ-SELF-IO-001
    statement: The Spec YAML and TOML serialization shall be lossless — from_yaml(to_yaml()) and from_toml(to_toml()) shall produce identical Spec objects.
    rationale: Users must be able to hand-edit serialized specs without data loss.
    verification_method: test
    acceptance_criteria:
      - Spec.from_yaml(spec.to_yaml()).model_dump() == spec.model_dump().
      - Spec.from_toml(spec.to_toml()).model_dump() == spec.model_dump().
    priority: high

  # --- Gap analysis ---
  - id: REQ-SELF-GAP-001
    statement: The standard_gap_analysis() function shall correctly identify covered and uncovered clauses.
    rationale: Gap analysis is the foundation of compliance reporting.
    verification_method: test
    acceptance_criteria:
      - A spec mapping REQ to clause 6.2.1 reports that clause as "covered".
      - An empty spec reports all normative clauses as "gap".
    priority: high

  # --- GtWR profiles ---
  - id: REQ-SELF-PROFILE-001
    statement: The web-app rule profile shall demote R6 (unit-bearing) and R7 (shall-language) to info severity.
    rationale: Web applications rarely use physical units or formal shall-language.
    verification_method: test
    acceptance_criteria:
      - A requirement with "500 requests" gets R6 severity=warning under formal, severity=info under web-app.
    priority: medium

  # --- auto_trace ---
  - id: REQ-SELF-TRACE-001
    statement: The auto_trace() function shall use word-boundary matching to prevent partial ID matches.
    rationale: REQ-001X must not match REQ-001.
    verification_method: test
    acceptance_criteria:
      - A file containing "REQ-001X" produces zero TraceLinks for REQ-001.
      - A file containing "REQ-001" produces exactly one TraceLink per occurrence.
    priority: high

  # --- Badge exporter ---
  - id: REQ-SELF-BADGE-001
    statement: The badge SVG exporter shall produce valid SVG with correct color coding (green=pass, red=fail, yellow=inconclusive).
    rationale: Badges are the primary visual indicator of V&V status in READMEs.
    verification_method: test
    acceptance_criteria:
      - All-pass report produces SVG with "#4c1" (green) and "PASS" text.
      - Any-fail report produces SVG with "#e05d44" (red) and "FAIL" text.
    priority: medium

  # --- Report diff ---
  - id: REQ-SELF-DIFF-001
    statement: The compare_reports() function shall correctly identify regressions (pass to fail transitions).
    rationale: Regression detection is critical for CI gates.
    verification_method: test
    acceptance_criteria:
      - A requirement that was pass in previous and fail in current appears in regressions list.
      - A requirement that was fail in previous and fail in current does NOT appear in regressions.
    priority: high

  # --- Deprecation infra ---
  - id: REQ-SELF-DEP-001
    statement: The deprecated() decorator shall emit a DeprecationWarning with the target version and alternative.
    rationale: Clean deprecation lifecycle prevents surprise breakage.
    verification_method: test
    acceptance_criteria:
      - A decorated function emits DeprecationWarning when called.
      - The warning message contains the version and alternative text.
    priority: medium

  # --- Self-hosting ---
  - id: REQ-SELF-META-001
    statement: The vnvspec self-spec shall be loadable by Spec.from_yaml() and shall pass structural validation.
    rationale: If vnvspec cannot spec itself, it cannot spec anything.
    verification_method: test
    acceptance_criteria:
      - Spec.from_yaml(".vnvspec/self-spec.yaml") succeeds.
      - All requirement IDs are unique and follow the PREFIX-NNN pattern.
    priority: blocking
