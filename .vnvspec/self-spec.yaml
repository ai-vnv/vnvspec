# vnvspec self-specification — vnvspec assessed against itself
#
# This spec defines the requirements that vnvspec (the tool) must satisfy.
# Run: vnvspec assess --self
# Or:  python scripts/self_assess.py
#
# Each requirement carries metadata.since to track which version introduced it.

name: vnvspec-self
version: "0.3.0"
description: >
  Self-hosting specification for the vnvspec package. Every requirement here
  is verified by the vnvspec test suite, lint/typecheck infrastructure, or
  by inspection of the codebase. If a change breaks self-assessment,
  that is a regression — the change is rolled back, not the self-spec.

requirements:
  # ==========================================================================
  # v0.1.0 requirements — original API surface
  # ==========================================================================

  # --- Core models ---
  - id: REQ-SELF-FROZEN-001
    statement: The core models (Spec, Requirement, Evidence, Hazard, ODD, IOContract, TraceLink) shall be frozen Pydantic models.
    rationale: Frozen models prevent accidental mutation and guarantee hashability for traceability graphs.
    verification_method: test
    acceptance_criteria:
      - 'Every core model has model_config = {"frozen": True}.'
      - Attempting to set an attribute on a constructed model raises a ValidationError.
    priority: blocking
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-PYDANTIC-001
    statement: All core models shall use Pydantic v2 BaseModel with full type annotations.
    rationale: Type-safe data models are the foundation of the vnvspec API.
    verification_method: test
    acceptance_criteria:
      - Every model class inherits from pydantic.BaseModel.
      - model_validate() and model_dump_json() round-trip without data loss.
    priority: blocking
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-SPEC-001
    statement: The Spec model shall validate uniqueness of requirement IDs and hazard IDs at construction time.
    rationale: Duplicate IDs would break traceability and coverage reporting.
    verification_method: test
    acceptance_criteria:
      - Constructing a Spec with duplicate requirement IDs raises SpecError.
      - Constructing a Spec with duplicate hazard IDs raises SpecError.
    priority: blocking
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-TRACE-GRAPH-001
    statement: The build_trace_graph() function shall reject cyclic traceability links.
    rationale: Traceability must form a DAG for correctness of coverage analysis.
    verification_method: test
    acceptance_criteria:
      - Cyclic links raise SpecError.
      - Acyclic links produce a valid networkx DiGraph.
    priority: high
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-GTWR-001
    statement: The GtWR quality checker shall implement at least 8 INCOSE-derived rules (R1 through R8).
    rationale: Requirement quality checking is a core differentiator of vnvspec.
    verification_method: test
    acceptance_criteria:
      - A textbook-good requirement produces zero violations.
      - A textbook-bad requirement produces at least 3 violations.
    priority: high
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-REGISTRIES-001
    statement: vnvspec shall ship at least 5 built-in standards registries loadable by name.
    rationale: Standards registries enable compliance mapping without manual clause entry.
    verification_method: test
    acceptance_criteria:
      - list_available() returns at least 5 registry names.
      - load("iso_pas_8800") returns a Registry with entries.
    priority: high
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-EXPORT-001
    statement: vnvspec shall export reports in at least 5 formats (HTML, JSON, Markdown, GSN/Mermaid, Annex IV).
    rationale: Multiple export formats serve different audiences (auditors, developers, stakeholders).
    verification_method: test
    acceptance_criteria:
      - export_html() produces valid HTML with evidence table.
      - export_json() produces valid JSON round-trippable to Report.
      - export_markdown() produces Markdown with verdict table.
      - export_gsn_mermaid() produces Mermaid flowchart syntax.
      - export_annex_iv() produces EU AI Act Annex IV headings.
    priority: high
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-ERRORS-001
    statement: All vnvspec exceptions shall inherit from VnvspecError and carry a help_url attribute.
    rationale: Structured error hierarchy enables programmatic error handling and user-friendly diagnostics.
    verification_method: test
    acceptance_criteria:
      - SpecError, RequirementError, ContractError, AssessmentError all inherit from VnvspecError.
      - Each has a help_url class attribute pointing to documentation.
    priority: medium
    metadata:
      since: "0.1.0"

  # ==========================================================================
  # v0.2.0 requirements — new features
  # ==========================================================================

  # --- Backward compatibility ---
  - id: REQ-SELF-COMPAT-001
    statement: Every public symbol exported by vnvspec v0.1.0 shall remain importable in v0.2.0 with the same signature.
    rationale: The v0.2 backward-compatibility contract is enforced in CI.
    verification_method: test
    acceptance_criteria:
      - scripts/check_v0_1_compat.py exits with code 0.
      - All 16 v0.1 symbols are importable from the vnvspec top-level namespace.
    priority: blocking
    metadata:
      since: "0.2.0"

  - id: REQ-SELF-FROZEN-002
    statement: The Spec.extend() method shall return a new Spec instance without mutating the original.
    rationale: Frozen-model invariance must extend to the extend() API itself.
    verification_method: test
    acceptance_criteria:
      - spec.extend(new_req) returns a new Spec.
      - The original spec.requirements list is unchanged.
    priority: blocking
    metadata:
      since: "0.2.0"

  # --- Type safety and code quality ---
  - id: REQ-SELF-TYPES-001
    statement: The vnvspec source code shall pass mypy --strict with zero errors.
    rationale: Strict type checking catches a class of bugs that tests miss.
    verification_method: analysis
    acceptance_criteria:
      - 'mypy --strict src/vnvspec reports "Success: no issues found".'
    priority: blocking
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-LINT-001
    statement: The vnvspec source code shall pass ruff format and ruff check with zero errors.
    rationale: Consistent formatting and lint rules reduce review friction.
    verification_method: analysis
    acceptance_criteria:
      - ruff format --check . reports all files formatted.
      - ruff check . reports all checks passed.
    priority: blocking
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-COV-001
    statement: The test suite shall achieve at least 95 percent code coverage.
    rationale: High coverage ensures all code paths are exercised by unit tests.
    verification_method: analysis
    acceptance_criteria:
      - pytest --cov-fail-under=95 exits with code 0.
    priority: blocking
    metadata:
      since: "0.1.0"

  - id: REQ-SELF-DOCS-001
    statement: The documentation site shall build with mkdocs --strict and zero warnings.
    rationale: Broken links and missing pages degrade the user experience.
    verification_method: analysis
    acceptance_criteria:
      - mkdocs build --strict exits with code 0.
    priority: high
    metadata:
      since: "0.1.0"

  # --- v0.2 ergonomics ---
  - id: REQ-SELF-ERGO-001
    statement: 'The Evidence.details field shall accept both str and dict values, auto-wrapping str to {"message": str}.'
    rationale: This was the number-one friction point reported in the labwork integration.
    verification_method: test
    acceptance_criteria:
      - 'Evidence(details="ok").details == {"message": "ok"}.'
      - 'Evidence(details={"key": "val"}).details == {"key": "val"}.'
      - JSON round-trip preserves the dict shape.
    priority: high
    metadata:
      since: "0.2.0"

  - id: REQ-SELF-ERGO-002
    statement: The Report.summary field shall accept both str and dict values, with the same auto-wrap as Evidence.details.
    rationale: Consistency with Evidence.details.
    verification_method: test
    acceptance_criteria:
      - 'Report(summary="ok").summary == {"message": "ok"}.'
    priority: medium
    metadata:
      since: "0.2.0"

  # --- v0.2 CLI ---
  - id: REQ-SELF-CLI-001
    statement: The vnvspec CLI shall use structured exit codes (0 through 5) as defined by ExitCode enum.
    rationale: Structured exit codes allow CI pipelines to distinguish failure modes.
    verification_method: inspection
    acceptance_criteria:
      - ExitCode enum defines OK=0, ASSESSMENT_FAILURES=1, INCONCLUSIVE=2, SPEC_VALIDATION_ERROR=3, USAGE_ERROR=4, INTERNAL_ERROR=5.
      - All CLI subcommands use ExitCode values, not raw integers.
    priority: medium
    metadata:
      since: "0.2.0"

  # --- v0.2 EvidenceCollector ---
  - id: REQ-SELF-COLLECTOR-001
    statement: The EvidenceCollector shall validate requirement IDs against the spec and raise RequirementError for unknown IDs.
    rationale: Strong contract prevents evidence from being silently orphaned.
    verification_method: test
    acceptance_criteria:
      - collector.check("UNKNOWN", True) raises RequirementError.
      - collector.record("UNKNOWN", "pass") raises RequirementError.
    priority: high
    metadata:
      since: "0.2.0"

  # --- v0.2 Spec I/O ---
  - id: REQ-SELF-IO-001
    statement: The Spec YAML and TOML serialization shall be lossless — from_yaml(to_yaml()) and from_toml(to_toml()) shall produce identical Spec objects.
    rationale: Users must be able to hand-edit serialized specs without data loss.
    verification_method: test
    acceptance_criteria:
      - Spec.from_yaml(spec.to_yaml()).model_dump() == spec.model_dump().
      - Spec.from_toml(spec.to_toml()).model_dump() == spec.model_dump().
    priority: high
    metadata:
      since: "0.2.0"

  # --- v0.2 Gap analysis ---
  - id: REQ-SELF-GAP-001
    statement: The standard_gap_analysis() function shall correctly identify covered and uncovered clauses.
    rationale: Gap analysis is the foundation of compliance reporting.
    verification_method: test
    acceptance_criteria:
      - A spec mapping REQ to clause 6.2.1 reports that clause as "covered".
      - An empty spec reports all normative clauses as "gap".
    priority: high
    metadata:
      since: "0.2.0"

  # --- v0.2 GtWR profiles ---
  - id: REQ-SELF-PROFILE-001
    statement: The web-app rule profile shall demote R6 (unit-bearing) and R7 (shall-language) to info severity.
    rationale: Web applications rarely use physical units or formal shall-language.
    verification_method: test
    acceptance_criteria:
      - A requirement with "500 requests" gets R6 severity=warning under formal, severity=info under web-app.
    priority: medium
    metadata:
      since: "0.2.0"

  # --- v0.2 auto_trace ---
  - id: REQ-SELF-TRACE-001
    statement: The auto_trace() function shall use word-boundary matching to prevent partial ID matches.
    rationale: REQ-001X must not match REQ-001.
    verification_method: test
    acceptance_criteria:
      - A file containing "REQ-001X" produces zero TraceLinks for REQ-001.
      - A file containing "REQ-001" produces exactly one TraceLink per occurrence.
    priority: high
    metadata:
      since: "0.2.0"

  # --- v0.2 Badge ---
  - id: REQ-SELF-BADGE-001
    statement: The badge SVG exporter shall produce valid SVG with correct color coding (green=pass, red=fail, yellow=inconclusive).
    rationale: Badges are the primary visual indicator of V&V status in READMEs.
    verification_method: test
    acceptance_criteria:
      - All-pass report produces SVG with "#4c1" (green) and "PASS" text.
      - Any-fail report produces SVG with "#e05d44" (red) and "FAIL" text.
    priority: medium
    metadata:
      since: "0.2.0"

  # --- v0.2 Report diff ---
  - id: REQ-SELF-DIFF-001
    statement: The compare_reports() function shall correctly identify regressions (pass to fail transitions).
    rationale: Regression detection is critical for CI gates.
    verification_method: test
    acceptance_criteria:
      - A requirement that was pass in previous and fail in current appears in regressions list.
      - A requirement that was fail in previous and fail in current does NOT appear in regressions.
    priority: high
    metadata:
      since: "0.2.0"

  # --- v0.2 Deprecation ---
  - id: REQ-SELF-DEP-001
    statement: The deprecated() decorator shall emit a DeprecationWarning with the target version and alternative.
    rationale: Clean deprecation lifecycle prevents surprise breakage.
    verification_method: test
    acceptance_criteria:
      - A decorated function emits DeprecationWarning when called.
      - The warning message contains the version and alternative text.
    priority: medium
    metadata:
      since: "0.2.0"

  # ==========================================================================
  # v0.3.0 requirements — catalog system + verdict fix
  # ==========================================================================

  # --- Phase 0: Verdict fix ---
  - id: REQ-SELF-VERDICT-001
    statement: The Report.verdict() method shall return "inconclusive" when any evidence has an inconclusive verdict and no failures are present (strict policy).
    rationale: Inconclusive evidence means "we don't know" and must not be silently upgraded to "pass".
    verification_method: test
    acceptance_criteria:
      - A report with pass + inconclusive evidence returns "inconclusive" under strict policy.
      - A report with pass + inconclusive evidence returns "pass" under lenient policy.
      - A report with fail + inconclusive evidence returns "fail" under both policies.
    priority: blocking
    metadata:
      since: "0.3.0"

  - id: REQ-SELF-SOURCE-001
    statement: The Requirement.source field shall accept both str and list[str], auto-normalizing a bare string to a one-element list.
    rationale: Catalogs cite multiple source URLs; backward compatibility requires accepting a single string.
    verification_method: test
    acceptance_criteria:
      - Requirement(source="url") normalizes to source=["url"].
      - Requirement(source=["a", "b"]) preserves the list.
      - Requirement() defaults to source=[].
    priority: high
    metadata:
      since: "0.3.0"

  - id: REQ-SELF-COMPAT-002
    statement: Every public symbol exported by vnvspec v0.2.0 shall remain importable in v0.3.0 with the same signature.
    rationale: The v0.3 backward-compatibility contract is enforced in CI.
    verification_method: test
    acceptance_criteria:
      - scripts/check_v0_2_compat.py exits with code 0.
    priority: blocking
    metadata:
      since: "0.3.0"

  - id: REQ-SELF-CATALOG-PYT-001
    statement: The PyTorch training catalog shall provide at least 30 requirements across reproducibility, gradient health, checkpointing, data loading, and loss validation sub-modules.
    rationale: The PyTorch catalog is the first real catalog and sets the quality bar for all subsequent catalogs.
    verification_method: test
    acceptance_criteria:
      - The catalog provides at least 30 requirements total.
      - All requirements pass the catalog inclusion policy (GtWR formal, source populated, ID convention).
      - At least 50% of requirements have standards mappings.
    priority: high
    metadata:
      since: "0.3.0"

  - id: REQ-SELF-SHIELDS-001
    statement: The Shields.io endpoint exporter shall produce valid JSON with schemaVersion, label, message, and color fields matching the Shields endpoint specification.
    rationale: Dynamic badges via Shields.io are the primary visual indicator of V&V status for GitHub repositories.
    verification_method: test
    acceptance_criteria:
      - All-pass report produces color "green".
      - Any-fail report produces color "red".
      - Inconclusive report produces color "yellow".
      - No-evidence report produces color "lightgrey".
    priority: high
    metadata:
      since: "0.3.0"

  - id: REQ-SELF-CATALOG-001
    statement: The vnvspec catalog CLI shall provide list, show, audit, and import subcommands.
    rationale: Discoverability and auditability are essential for a catalog system.
    verification_method: test
    acceptance_criteria:
      - vnvspec catalog list shows at least the demo module.
      - vnvspec catalog show vnvspec.catalog.demo displays CAT-DEMO-001.
      - vnvspec catalog audit runs without errors.
      - vnvspec catalog import vnvspec.catalog.demo produces valid YAML.
    priority: high
    metadata:
      since: "0.3.0"

  - id: REQ-SELF-FORMAL-001
    statement: The VerificationMethod type shall accept "formal_proof" as a valid value.
    rationale: Vocabulary reservation for v0.4 formal-methods integration.
    verification_method: test
    acceptance_criteria:
      - A Requirement with verification_method="formal_proof" passes validation.
      - The value round-trips through JSON serialization.
    priority: medium
    metadata:
      since: "0.3.0"

  # --- Self-hosting ---
  - id: REQ-SELF-META-001
    statement: The vnvspec self-spec shall be loadable by Spec.from_yaml() and shall pass structural validation.
    rationale: If vnvspec cannot spec itself, it cannot spec anything.
    verification_method: test
    acceptance_criteria:
      - Spec.from_yaml(".vnvspec/self-spec.yaml") succeeds.
      - All requirement IDs are unique and follow the PREFIX-NNN pattern.
    priority: blocking
    metadata:
      since: "0.2.0"
