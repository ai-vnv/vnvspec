name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - run: uv pip install -e packages/pytest-vnvspec
      - name: Build docs
        run: uv run mkdocs build -d site

      - name: Run self-assessment and build dashboard
        run: |
          uv run pytest -p no:vnvspec -p pytest_vnvspec.plugin \
            --vnvspec-spec=.vnvspec/self-spec.yaml \
            --vnvspec-report=.vnvspec/pytest-self-report.json \
            --ignore=packages -q || true
          uv run python -c "
          from vnvspec import Spec
          from vnvspec.core.assessment import Report
          from vnvspec.exporters.dashboard import export_dashboard
          import json
          spec = Spec.from_yaml('.vnvspec/self-spec.yaml')
          report = Report.model_validate(json.loads(open('.vnvspec/pytest-self-report.json').read()))
          export_dashboard(
              spec, report,
              output_dir='site/dashboard',
              dashboard_url='https://ai-vnv.kfupm.io/vnvspec/dashboard/',
          )
          print(f'Dashboard: {len(spec.requirements)} requirements')
          "

      - name: Generate Shields endpoint badge
        run: |
          uv run python -c "
          from vnvspec.core.assessment import Report
          from vnvspec.exporters.shields_endpoint import export_shields_endpoint
          import json
          report = Report.model_validate(json.loads(open('.vnvspec/pytest-self-report.json').read()))
          export_shields_endpoint(report, path='site/vnv-badge.json')
          print(f'Badge: {report.verdict()} ({report.pass_count()}/{len(report.evidence)})')
          "

      - name: Deploy to lab site
        env:
          DEPLOY_TOKEN: ${{ secrets.LAB_SITE_DEPLOY_TOKEN }}
        run: |
          cd /tmp
          git clone --depth 1 https://x-access-token:${DEPLOY_TOKEN}@github.com/mansurarief/ai-vnv-lab-site.git lab-site
          rm -rf lab-site/vnvspec
          cp -r $GITHUB_WORKSPACE/site lab-site/vnvspec
          cd lab-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vnvspec
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "docs: update vnvspec docs from ai-vnv/vnvspec@${GITHUB_SHA::7}"
          git push
