name: vnvspec
description: Run vnvspec assessment, generate badges, and post results
inputs:
  spec:
    description: Path to spec file (YAML, TOML, or JSON)
    required: true
  report-format:
    description: Comma-separated formats (html,json,xlsx)
    default: html,json
  fail-on:
    description: "Failure policy: any | blocking | never"
    default: blocking
  python-version:
    description: Python version to use
    default: "3.12"
  verdict-policy:
    description: "Verdict policy: strict | lenient"
    default: strict
  publish-badge:
    description: Push badge JSON to gh-pages for Shields endpoint (true/false)
    default: "true"
  comment-pr:
    description: Post assessment summary as PR comment (true/false)
    default: "true"
  github-token:
    description: Token for gh-pages push and PR comment (GITHUB_TOKEN works for same-repo)
    default: ${{ github.token }}
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install vnvspec
      shell: bash
      run: pip install vnvspec

    - name: Validate spec
      shell: bash
      run: vnvspec validate "${{ inputs.spec }}"

    - name: Run assessment
      shell: bash
      id: assess
      run: |
        FORMATS="${{ inputs.report-format }}"
        IFS=',' read -ra FMT_ARRAY <<< "$FORMATS"
        for fmt in "${FMT_ARRAY[@]}"; do
          vnvspec export "${{ inputs.spec }}" --format "$fmt" --output "vnvspec-report.$fmt" || true
        done

    - name: Generate badge SVG
      shell: bash
      run: |
        python -c "
        from vnvspec.core.assessment import Report
        from vnvspec.exporters.badge import export_badge
        import json, pathlib
        if pathlib.Path('vnvspec-report.json').exists():
            data = json.loads(pathlib.Path('vnvspec-report.json').read_text())
            report = Report.model_validate(data)
            export_badge(report, path='vnvspec-badge.svg')
        " || true

    - name: Generate Shields endpoint JSON
      shell: bash
      run: |
        python -c "
        from vnvspec.core.assessment import Report
        from vnvspec.exporters.shields_endpoint import export_shields_endpoint
        import json, pathlib
        if pathlib.Path('vnvspec-report.json').exists():
            data = json.loads(pathlib.Path('vnvspec-report.json').read_text())
            report = Report.model_validate(data)
            export_shields_endpoint(report, path='vnv-badge.json')
        " || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vnvspec-results
        path: |
          vnvspec-report.*
          vnvspec-badge.svg
          vnv-badge.json
        if-no-files-found: ignore

    - name: Publish badge to gh-pages
      if: inputs.publish-badge == 'true' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ inputs.github-token }}
        publish_dir: .
        destination_dir: .
        keep_files: true
        allow_empty_commit: false
      env:
        ACTIONS_DEPLOY_KEY: ""

    - name: Post PR comment
      if: inputs.comment-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          let body = '## vnvspec assessment\n\n';
          try {
            const data = JSON.parse(fs.readFileSync('vnv-badge.json', 'utf8'));
            const colorEmoji = {green: '🟢', yellow: '🟡', red: '🔴', lightgrey: '⚪'}[data.color] || '⚪';
            body += `**Verdict:** ${colorEmoji} **${data.message}**\n\n`;
          } catch (e) {
            body += '**Verdict:** ⚪ No assessment data available.\n\n';
          }
          body += `Full report: [download artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n`;
          body += '---\n*Generated by [vnvspec](https://github.com/ai-vnv/vnvspec)*';
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
